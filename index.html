<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>啾咪宇宙 Jumi Universe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: linear-gradient(180deg, #f8e8ff, #e8f4ff);
      color: #4a3b5c;
      text-align: center;
    }
    .banner {
  width: 100%;
  max-width: 1000px;
  border-radius: 28px;
  margin-bottom: 28px;
  box-shadow: 0 12px 30px rgba(160, 120, 200, 0.25);
}
    .wrap {
      max-width: 1000px;
      margin: auto;
      padding: 50px 20px;
    }
    .hero {
      background: white;
      border-radius: 28px;
      padding: 42px 24px;
      box-shadow: 0 12px 30px rgba(160, 120, 200, 0.22);
    }
    h1 {
      font-size: 46px;
      margin: 10px 0;
      color: #8e5bd8;
    }
    h2 {
      font-weight: normal;
      color: #ff7eb6;
      margin-bottom: 24px;
    }
    .subtitle {
      font-size: 20px;
      line-height: 1.8;
    }
    .stars {
      font-size: 34px;
      margin-bottom: 10px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 22px;
      margin-top: 34px;
    }
  .card {
    background: white;
    border-radius: 24px;
    padding: 28px 20px;
    box-shadow: 0 8px 22px rgba(120, 90, 160, 0.18);
    transition: all 0.3s ease;
    .btn:hover {
    transform: scale(1.05);
    background: #ffcc4d;
}
    display: flex;
    flex-direction: column;
    justify-content: space-between;

    min-height: 370px;
}
    .card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 40px rgba(160,120,200,0.25);
}
    .card h3 {
      font-size: 24px;
      color: #7b4fd6;
      margin-bottom: 12px;
    }
    .card p {
      line-height: 1.7;
      color: #5f5570;
    }
  .btn {
    display: inline-block;
    margin-top: auto;
    align-self: center;

    padding: 12px 22px;
    border-radius: 999px;
    background: #ffd66b;
    color: #4a3b5c;
    text-decoration: none;
    font-weight: bold;
}
    .message {
      margin-top: 36px;
      background: #fff7fb;
      border-radius: 24px;
      padding: 28px;
      line-height: 1.9;
      box-shadow: 0 8px 22px rgba(160, 120, 200, 0.15);
    }
    .footer {
      margin-top: 40px;
      color: #8b7f99;
      font-size: 14px;
    }
    .planet-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:40px;
    margin:50px 0;
}

.planet{
    text-decoration:none;
    color:#4a3b5c;
    background:white;
    border-radius:50%;
    width:220px;
    height:220px;
    margin:auto;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    box-shadow:0 12px 28px rgba(140,120,180,.25);

    transition:all .4s ease;
}

.planet:hover{
    animation:spin 2s linear infinite;
    transform:scale(1.08);

    box-shadow:0 20px 40px rgba(255,215,120,.45);
}

@keyframes spin{
    from{
        transform:rotate(0deg) scale(1.08);
    }
    to{
        transform:rotate(360deg) scale(1.08);
    }
}

.planet-icon{
    font-size:64px;
    margin-bottom:12px;
}

.planet h3{
    margin:0;
    font-size:28px;
}

.planet p{
    margin-top:8px;
    font-size:16px;
}

/* 四顆星球顏色 */

.chat{
    background:linear-gradient(180deg,#ffe4fa,#f7d4ff);
}

.travel{
    background:linear-gradient(180deg,#dff8ff,#d4ecff);
}

.english{
    background:linear-gradient(180deg,#fff6cf,#ffeaa0);
}

.daily{
    background:linear-gradient(180deg,#ffe0ec,#ffcce1);
}
  </style>
</head>
<body>
  <div class="wrap">

    <img class="banner" src="jumi-banner.png" alt="啾咪宇宙首頁圖">
    <div class="hero">
      <div class="stars">🌙 ⭐ 🚀 💖 ☁️</div>
      <h1>啾咪宇宙</h1>
      <h2>Jumi Universe</h2>
      <p class="subtitle">
        記錄孩子最真實的童言童語，<br>
        收藏一起長大的珍貴時光。
      </p>
      <a class="btn" href="#sections">開始探索</a>
    </div>

   <div class="planet-grid">

    <a class="planet chat" href="chat.html">
        <div class="planet-icon">🪐</div>
        <h3>聊天星球</h3>
        <p>啾咪聊天室</p>
    </a>

    <a class="planet travel" href="travel.html">
        <div class="planet-icon">🚀</div>
        <h3>探險星球</h3>
        <p>啾咪出發！GO！</p>
    </a>

    <a class="planet english" href="english.html">
        <div class="planet-icon">📚</div>
        <h3>英文星球</h3>
        <p>啾咪英文課</p>
    </a>

    <a class="planet daily" href="daily.html">
        <div class="planet-icon">🎬</div>
        <h3>創作星球</h3>
        <p>啾咪小宇宙</p>
    </a>

</div>

    <div class="message">
      <h3>💖 歡迎來到我們的小宇宙</h3>
      <p>
        有些聲音，長大後就再也聽不到了。<br>
        所以我們想把孩子現在的笑聲、想法、夢想和日常，
        好好收藏起來。
      </p>
      <p>
        這裡是啾啾和咪咪的成長星球，<br>
        也是一家人一起慢慢長大的紀錄。
      </p>
    </div>

    <div class="footer">
      © 2026 啾咪宇宙 Jumi Universe
    </div>

  </div>
</body>
</html>
